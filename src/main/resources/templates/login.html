<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bodega Express</title>
    <link rel="stylesheet"
          href="/css/style.css?v=sprint4-ui-2"
          th:href="@{/css/style.css(v='sprint4-ui-2')}">
</head>

<body class="login-page">

<main class="login-card">
    <h1>Bodega Express</h1>
    <p class="login-subtitle">Sistema de Gestión Multi-Bodega</p>

    <div th:if="${param.error}" class="alert-error">
        Credenciales incorrectas o usuario inactivo.
    </div>

    <div th:if="${param.logout}" class="alert-success">
        Sesión cerrada correctamente.
    </div>

    <form action="/login" method="post" class="login-form">
        <label for="email">Correo Electrónico</label>
        <input id="email"
               type="email"
               name="email"
               autocomplete="username"
               required>

        <label for="password">Contraseña</label>
        <input id="password"
               type="password"
               name="password"
               autocomplete="current-password"
               required>

        <button type="submit" class="login-submit">Ingresar</button>
    </form>

    <p class="login-help">¿No tienes cuenta? Contacta al administrador.</p>
</main>

</body>
</html>
