<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido registrado</title>
    <link rel="stylesheet"
          href="/css/style.css?v=sprint4-ui-2"
          th:href="@{/css/style.css(v='sprint4-ui-2')}">
</head>

<body class="pedido-exito-page">

<main class="pedido-exito-card">
    <div class="pedido-exito-icon">✓</div>
    <h1>Pedido registrado</h1>
    <p class="pedido-exito-text">
        Tu pedido fue enviado correctamente. Lo atenderemos en breve.
    </p>

    <section th:if="${idPedido != null}" class="pedido-resumen">
        <div class="pedido-resumen-row">
            <span>Número de pedido</span>
            <strong>#<span th:text="${idPedido}"></span></strong>
        </div>
        <div class="pedido-resumen-row">
            <span>Cliente</span>
            <strong th:text="${nombreContacto}">Cliente</strong>
        </div>
        <div class="pedido-resumen-row">
            <span>Entrega</span>
            <strong th:text="${tipoEntrega}">DELIVERY</strong>
        </div>
        <div class="pedido-resumen-row" th:if="${direccionEnvio != null}">
            <span>Dirección</span>
            <strong th:text="${direccionEnvio}">Dirección</strong>
        </div>
        <div class="pedido-resumen-row pedido-resumen-total">
            <span>Total</span>
            <strong>S/ <span th:text="${totalPedido}">0.00</span></strong>
        </div>
    </section>

    <a th:href="@{'/tienda/' + ${idEmpresa}}" class="btn pedido-exito-btn">
        Volver al catálogo
    </a>
</main>

</body>
</html>
